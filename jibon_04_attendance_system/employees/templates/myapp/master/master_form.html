<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pookie Attendance 💖</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .pookie-box {
        background: white;
        padding: 30px;
        border-radius: 20px;
        width: 400px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        text-align: center;
        animation: pop 0.5s ease;
    }

    @keyframes pop {
        from {transform: scale(0.8); opacity: 0;}
        to {transform: scale(1); opacity: 1;}
    }

    h2 {
        color: #ff4d6d;
        margin-bottom: 20px;
    }

    label {
        display: block;
        text-align: left;
        font-size: 14px;
        margin-bottom: 5px;
        color: #555;
    }

    input, select {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ddd;
        margin-bottom: 15px;
        transition: 0.3s;
    }

    input:focus, select:focus {
        border-color: #ff4d6d;
        box-shadow: 0 0 8px rgba(255,77,109,0.3);
    }

    .pookie-btn {
        background: linear-gradient(135deg, #ff4d6d, #ff8fa3);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 12px;
        width: 100%;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .pookie-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .cute-note {
        font-size: 12px;
        color: #888;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="pookie-box">
    <h2>✨ Pookie Attendance ✨</h2>

    <form method="POST">
        {% csrf_token %}

        {{form.as_p}}

        <button type="submit" class="pookie-btn">Save my vibe 💾</button>
    </form>

    <div class="cute-note">Made with extra love 💕</div>
</div>

</body>
</html>

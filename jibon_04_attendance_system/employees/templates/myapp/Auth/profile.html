<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pookie Profile 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

/* CONTAINER */
.container {
    max-width: 800px;
    margin: 60px auto;
    background: #fff;
    border-radius: 20px;
    padding: 35px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* HEADER */
h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #ff4d6d;
}

/* PROFILE CARD */
.profile-card {
    display: flex;
    gap: 30px;
    align-items: center;
}

/* IMAGE */
.profile-img {
    text-align: center;
}

.profile-img img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid #ff8fa3;
    transition: 0.3s;
}

.profile-img img:hover {
    transform: scale(1.05);
}

/* INFO */
.profile-info {
    flex: 1;
}

.profile-info p {
    font-size: 16px;
    margin: 10px 0;
    color: #555;
}

.label {
    font-weight: bold;
    color: #333;
}

/* BUTTONS */
.actions {
    margin-top: 35px;
    text-align: center;
}

.actions a {
    display: inline-block;
    margin: 8px;
    padding: 10px 20px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-size: 14px;
    transition: 0.3s;
}

.dashboard { background: linear-gradient(135deg, #4dabf7, #74c0fc); }
.edit { background: linear-gradient(135deg, #ff6b6b, #ffa8a8); }
.password { background: linear-gradient(135deg, #ffd166, #ffe066); color: #000; }
.logout { background: linear-gradient(135deg, #ff4d6d, #ff8fa3); }

.actions a:hover {
    transform: translateY(-3px) scale(1.05);
    opacity: 0.9;
}

/* CUTE FOOTER */
.footer-note {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 15px;
}

/* RESPONSIVE */
@media(max-width: 600px) {
    .profile-card {
        flex-direction: column;
        text-align: center;
    }
}
</style>
</head>

<body>

<div class="container">

    <h2>✨ My Pookie Profile ✨</h2>

    <div class="profile-card">

        <!-- IMAGE -->
        <div class="profile-img">
            {% if profile.photo %}
                <img src="{{ profile.photo.url }}" alt="Profile Photo">
            {% else %}
                <img src="https://via.placeholder.com/150" alt="No Image">
            {% endif %}
        </div>

        <!-- INFO -->
        <div class="profile-info">
            <p><span class="label">💖 Name:</span> {{ profile.user.username }}</p>
            <p><span class="label">🏢 Department:</span> {{ profile.department }}</p>
            <p><span class="label">💼 Role:</span> {{ profile.designation }}</p>
            <p><span class="label">💰 Salary:</span> {{ profile.salary }}</p>
        </div>

    </div>

    <!-- ACTIONS -->
    <div class="actions">
        <a href="{% url 'dashboard' %}" class="dashboard">📊 Dashboard</a>
        <a href="/edit-profile/" class="edit">✏️ Glow Up Profile</a>
        <a href="/change-password/" class="password">🔑 Secret Update</a>
        <a href="/logout/" class="logout">🚪 Bye Pookie</a>
    </div>

    <div class="footer-note">Made with pookie love 💕</div>

</div>

</body>
</html>

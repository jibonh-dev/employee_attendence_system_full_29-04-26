<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pookie Register 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.register-box {
    width: 380px;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    text-align: center;
    animation: pop 0.5s ease;
}

@keyframes pop {
    from {transform: scale(0.8); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

h2 {
    margin-bottom: 20px;
    color: #ff4d6d;
}

/* FORM */
form p {
    text-align: left;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-top: 5px;
    transition: 0.3s;
}

input:focus {
    border-color: #ff4d6d;
    box-shadow: 0 0 8px rgba(255,77,109,0.3);
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff4d6d, #ff8fa3);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* LINK */
a {
    display: block;
    margin-top: 15px;
    font-size: 14px;
    color: #ff4d6d;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* NOTE */
.note {
    margin-top: 10px;
    font-size: 12px;
    color: #999;
}
</style>
</head>

<body>

<div class="register-box">

    <h2>✨ Join the Pookie Squad ✨</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Register 💖</button>
    </form>

    <a href="/login/">Already a pookie? Login 🥺</a>

    <div class="note">We’re excited to have you 💕</div>

</div>

</body>
</html>
